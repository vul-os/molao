# South Africa — the reference region profile.
#
# This file is the ZA profile as data. A test in molao-core parses it and
# asserts it equals the built-in `region::ZA` constant: if the two can drift,
# the "data" claim is decoration. Edit both together, or neither.
#
# Court codes follow the LII convention used by SAFLII and AfricanLII.
#
# Changing anything here changes what the citation parser accepts, which changes
# extraction output, which requires an EXTRACTOR_VERSION bump. See
# docs/CITATIONS.md.

code = "ZA"
name = "South Africa"

# ---- apex --------------------------------------------------------

[[courts]]
code = "ZACC"
name = "Constitutional Court of South Africa"
tier = "apex"
seat = "Johannesburg"

