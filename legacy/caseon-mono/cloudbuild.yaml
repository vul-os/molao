steps:   
  # Setup Google Cloud credentials for the build
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    dir: './backend/service'
    
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/${PROJECT_ID}/caseon:latest',
      '--cache-from', 'gcr.io/${PROJECT_ID}/caseon:latest',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '.'
    ]
    dir: './backend/service'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/caseon:latest']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'caseon-mono'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/caseon:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      
options:
  logging: CLOUD_LOGGING_ONLY
  env: ['DOCKER_BUILDKIT=1']

# Store image in Artifact Registry
images:
  - 'gcr.io/${PROJECT_ID}/caseon:latest'

# Substitutions
substitutions:
  _SERVICE_ACCOUNT: 'YOUR-SERVICE-ACCOUNT@${PROJECT_ID}.iam.gserviceaccount.com'  # Replace with your service account

