steps:
  # Download model files from Cloud Storage
  - name: 'gcr.io/cloud-builders/bash'
    args: ['-c', 'mkdir -p /workspace/models']
    
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['rsync', '-r', 'gs://caseon-models/', '/workspace/models/']
    
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/${PROJECT_ID}/caseon:latest',
      '--cache-from', 'gcr.io/${PROJECT_ID}/caseon:latest',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '--build-arg', 'COPY_MODELS=true',
      '.'
    ]
    dir: './backend/service'  # Changed to your specific subdirectory path
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/caseon:latest']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'caseon-mono'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/caseon:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      
options:
  logging: CLOUD_LOGGING_ONLY
  env: ['DOCKER_BUILDKIT=1']
# Store image in Artifact Registry
images:
  - 'gcr.io/${PROJECT_ID}/caseon:latest'

