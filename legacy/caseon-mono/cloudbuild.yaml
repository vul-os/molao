steps:
  # Create a service account key (for the build) and save it as .gcp-key.json in the build context (backend/service)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args: ['-c', 'gcloud iam service-accounts keys create .gcp-key.json --iam-account=$$CLOUD_BUILD_SA']
    dir: './backend/service'
    env:
      - 'CLOUD_BUILD_SA=${_SERVICE_ACCOUNT}'

  # Build the container image (using substitution for bucket name) and mount the service account key (if available) as a volume
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/${PROJECT_ID}/caseon:latest',
      '--cache-from', 'gcr.io/${PROJECT_ID}/caseon:latest',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '--build-arg', 'BUCKET_NAME=${_BUCKET_NAME}',
      '.'
    ]
    dir: './backend/service'
    volumes:
      - name: 'gcp-key'
        path: './backend/service/.gcp-key.json'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/caseon:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'caseon-mono'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/caseon:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
  env: ['DOCKER_BUILDKIT=1']

# Store image in Artifact Registry
images:
  - 'gcr.io/${PROJECT_ID}/caseon:latest'

# Substitutions
substitutions:
  _SERVICE_ACCOUNT: '160638720514-compute@developer.gserviceaccount.com'  # Replace with your service account (e.g. cloudbuild@${PROJECT_ID}.iam.gserviceaccount.com)
  _BUCKET_NAME: 'caseon-models'  # Replace with your bucket